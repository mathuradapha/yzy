{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>🎟 My Tickets</h2>

<div class="row">

{% for t in tickets %}

<div class="col-md-4">

<div class="card bg-dark text-white p-3 mb-3">

<h5>{{t.movie.title}}</h5>

<p>Seat : {{t.seat}}</p>

<p>{{t.created_at}}</p>

</div>

</div>

{% endfor %}

</div>

</div>

{% endblock %}

{% extends 'base.html' %}

{% block content %}
<style>
    :root {
        --bg-color: #0d1117;
        --card-bg: #161b22;
        --text-color: #ffffff;
        --text-muted: #8b949e;
        --border-color: #30363d;
        --primary-blue: #0d6efd;
        --accent-yellow: #ffc107;
    }

    body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    /* จัดการให้การ์ดอยู่กลางหน้าจอ */
    .edit-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .edit-card {
        background-color: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .edit-card h2 {
        font-weight: 700;
        margin-bottom: 10px;
        text-align: center;
        color: var(--primary-blue);
    }

    .edit-card p {
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 30px;
        font-size: 0.9rem;
    }

    /* ตกแต่ง Input */
    .form-group {
        margin-bottom: 20px;
    }

    .form-label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: var(--text-muted);
    }

    .form-input {
        width: 100%;
        padding: 12px 15px;
        background-color: #0d1117;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: white;
        font-size: 1rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--primary-blue);
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.2);
    }

    /* ปุ่มบันทึก */
    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: var(--primary-blue);
        color: white;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
    }

    .btn-submit:hover {
        background-color: #0b5ed7;
    }

    .btn-submit:active {
        transform: scale(0.98);
    }

    /* ปุ่มยกเลิก/กลับ */
    .btn-cancel {
        display: block;
        text-align: center;
        margin-top: 15px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.85rem;
    }

    .btn-cancel:hover {
        color: white;
    }
</style>

<div class="edit-container">
    <div class="edit-card">
        <h2>แก้ไขข้อมูลสมาชิก</h2>
        <p>ระบุชื่อผู้ใช้งานใหม่ที่ต้องการเปลี่ยน</p>

        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label class="form-label">ชื่อผู้ใช้งาน (Username)</label>
                <input type="text" 
                       name="username" 
                       class="form-input" 
                       value="{{ u.username }}" 
                       placeholder="กรอกชื่อผู้ใช้งาน..."
                       required>
            </div>

            <button type="submit" class="btn-submit">
                <i class="fas fa-save me-2"></i> บันทึกการเปลี่ยนแปลง
            </button>
            
            <a href="/manage-users" class="btn-cancel">
                <i class="fas fa-times me-1"></i> ยกเลิกและกลับหน้าจัดการ
            </a>
        </form>
    </div>
</div>
{% endblock %}

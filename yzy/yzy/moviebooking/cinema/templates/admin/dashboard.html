{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

<h2>🎬 Admin Dashboard</h2>

<div class="d-flex gap-2 mb-3">
    <a href="/add-movie" class="btn btn-success">Add Movie</a>
    
    <a href="{% url 'admin_users' %}" class="btn btn-primary">
        <i class="fas fa-users"></i> จัดการสมาชิก
    </a>
</div>

<table class="table table-dark">

<tr>
    <th>Poster</th>
    <th>Title</th>
    <th>Category</th>
    <th>Age</th>
    <th>Action</th>
</tr>

{% for m in movies %}
<tr>

    <td>
        <img src="{{m.poster.url}}" width="80">
    </td>

    <td>{{m.title}}</td>
    <td>{{m.category}}</td>
    <td>{{m.age_rating}}</td>

    <td>
        <a href="/edit-movie/{{m.id}}" class="btn btn-warning">
            Edit
        </a>

        <a href="{% url 'delete_movie' m.id %}" 
           onclick="return confirm('คุณแน่ใจหรือไม่ว่าต้องการลบภาพยนตร์เรื่องนี้?');" 
           class="btn btn-danger">
            Delete
        </a>
    </td>

</tr>
{% endfor %}

</table>

</div>

{% endblock %}
